<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Edit Tugas - Star Tools</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #F1F5F9;
    color: #0F172A;
  }

  body.dark {
    background: #0B1120;
    color: #F1F5F9;
  }

  body.dark .app-header,
  body.dark .sidebar-nav,
  body.dark .card,
  body.dark .alert-box,
  body.dark .link-box {
    background: #111827;
    border-color: #1E293B;
  }

  body.dark .input-field {
    background: #1E293B;
    border-color: #334155;
    color: #F1F5F9;
  }

  body.dark .input-field::placeholder {
    color: #64748B;
  }

  body.dark .file-upload {
    border-color: #334155;
  }

  body.dark .file-preview {
    background: #1E293B;
  }

  body.dark .btn-secondary {
    background: #334155;
    color: #F1F5F9;
  }

  body.dark .info-box {
    background: #1E293B;
    border-color: #334155;
  }

  body.dark .info-box .label {
    color: #94A3B8;
  }

  body.dark .btn-save:disabled {
    background: #334155;
    color: #94A3B8;
  }

  .app-container {
    max-width: 560px;
    margin: 0 auto;
    background: #F1F5F9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-x: hidden;
  }

  body.dark .app-container {
    background: #0B1120;
  }

  .app-header {
    background: #FFFFFF;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #E2E8F0;
    position: sticky;
    top: 0;
    z-index: 20;
    flex-shrink: 0;
  }

  body.dark .app-header {
    background: #111827;
    border-bottom-color: #1E293B;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .menu-icon {
    width: 40px;
    height: 40px;
    background: #F8FAFE;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid #E2E8F0;
    flex-shrink: 0;
  }

  body.dark .menu-icon {
    background: #1E293B;
    border-color: #334155;
  }

  .menu-icon svg {
    stroke: #0F172A;
  }

  body.dark .menu-icon svg {
    stroke: #F1F5F9;
  }

  .app-title {
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #2563EB, #60A5FA);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
  }

  .header-action {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    color: #0F172A;
    font-weight: 500;
    font-size: 14px;
    border: none;
    background: none;
    padding: 4px 8px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  body.dark .back-btn {
    color: #F1F5F9;
  }

  .back-btn svg {
    stroke: #0F172A;
    width: 20px;
    height: 20px;
  }

  body.dark .back-btn svg {
    stroke: #F1F5F9;
  }

  .back-btn:active {
    transform: scale(0.95);
  }

  .sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    visibility: hidden;
    opacity: 0;
    transition: 0.25s;
  }

  .sidebar-overlay.active {
    visibility: visible;
    opacity: 1;
  }

  .sidebar-nav {
    position: fixed;
    top: 0;
    left: -280px;
    width: 280px;
    height: 100%;
    background: #FFFFFF;
    z-index: 101;
    transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    padding: 70px 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
    overflow-y: auto;
  }

  body.dark .sidebar-nav {
    background: #111827;
  }

  .sidebar-nav.active {
    left: 0;
  }

  .sidebar-nav a {
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 500;
    border-radius: 18px;
    text-decoration: none;
    color: #0F172A;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }

  body.dark .sidebar-nav a {
    color: #F1F5F9;
  }

  .sidebar-nav a:active {
    background: #DBEAFE;
  }

  body.dark .sidebar-nav a:active {
    background: #1E293B;
  }

  .sidebar-nav a svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
  }

  .logout-link {
    margin-top: 20px;
    border-top: 1px solid #E2E8F0;
    padding-top: 16px;
  }

  body.dark .logout-link {
    border-top-color: #334155;
  }

  .logout-link a {
    color: #DC2626 !important;
  }

  .logout-link a svg {
    stroke: #DC2626;
  }

  .close-sidebar-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
  }

  .close-sidebar-icon svg {
    stroke: #0F172A;
  }

  body.dark .close-sidebar-icon svg {
    stroke: #F1F5F9;
  }

  .page-container {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    padding-bottom: 30px;
  }

  .card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid #E2E8F0;
  }

  body.dark .card {
    background: #111827;
    border-color: #1E293B;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-sub {
    font-size: 14px;
    color: #64748B;
    margin-bottom: 12px;
  }

  body.dark .card-sub {
    color: #94A3B8;
  }

  .card-title svg {
    width: 20px;
    height: 20px;
    stroke: #2563EB;
  }

  .input-field {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #E2E8F0;
    border-radius: 10px;
    background: #FFFFFF;
    color: #0F172A;
    font-size: 14px;
    font-family: inherit;
  }

  body.dark .input-field {
    background: #1E293B;
    border-color: #334155;
    color: #F1F5F9;
  }

  .input-field:focus {
    outline: none;
    border-color: #2563EB;
  }

  .input-field::placeholder {
    color: #94A3B8;
  }

  .input-field:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  textarea.input-field {
    min-height: 80px;
    resize: vertical;
  }

  .input-group {
    margin-bottom: 12px;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 4px;
  }

  body.dark .input-group label {
    color: #94A3B8;
  }

  .file-upload {
    border: 2px dashed #E2E8F0;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    color: #94A3B8;
    transition: 0.2s;
  }

  body.dark .file-upload {
    border-color: #334155;
  }

  .file-upload.has-file {
    border-color: #34D399;
  }

  .file-upload:active {
    transform: scale(0.97);
  }

  .file-upload svg {
    width: 28px;
    height: 28px;
    stroke: #94A3B8;
    display: block;
    margin: 0 auto 4px;
  }

  .file-preview {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: #F1F5F9;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 13px;
  }

  body.dark .file-preview {
    background: #1E293B;
  }

  .file-preview .remove {
    color: #DC2626;
    cursor: pointer;
    font-weight: 700;
    font-size: 18px;
  }

  .file-exists {
    font-size: 12px;
    color: #64748B;
    margin-top: 4px;
  }

  body.dark .file-exists {
    color: #94A3B8;
  }

  .link-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #F1F5F9;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid #E2E8F0;
    margin-top: 6px;
  }

  body.dark .link-box {
    background: #1E293B;
    border-color: #334155;
  }

  .link-box .link-text {
    flex: 1;
    font-size: 13px;
    color: #2563EB;
    word-break: break-all;
    font-weight: 500;
  }

  body.dark .link-box .link-text {
    color: #60A5FA;
  }

  .link-box .copy-btn {
    background: #E2E8F0;
    border: none;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: #0F172A;
    flex-shrink: 0;
  }

  body.dark .link-box .copy-btn {
    background: #334155;
    color: #F1F5F9;
  }

  .link-box .copy-btn:active {
    transform: scale(0.95);
  }

  .info-box {
    background: #F1F5F9;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #E2E8F0;
  }

  body.dark .info-box {
    background: #1E293B;
    border-color: #334155;
  }

  .info-box .label {
    font-size: 10px;
    color: #94A3B8;
    text-transform: uppercase;
  }

  .info-box .value {
    font-size: 14px;
    font-weight: 600;
    margin-top: 2px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn-save {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #2563EB;
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-save:active {
    transform: scale(0.97);
  }

  .btn-save:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    background: #94A3B8;
  }

  body.dark .btn-save:disabled {
    background: #334155;
    color: #94A3B8;
  }

  .btn-save .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .btn-save.loading .spinner {
    display: block;
  }

  .btn-save.loading .btn-text {
    display: none;
  }

  .btn-save.loading .btn-text-loading {
    display: inline;
  }

  .btn-text-loading {
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn-save.btn-danger {
    background: #DC2626;
  }

  .btn-save.btn-danger:active {
    background: #B91C1C;
  }

  .btn-save.btn-secondary {
    background: #E2E8F0;
    color: #0F172A;
  }

  body.dark .btn-save.btn-secondary {
    background: #334155;
    color: #F1F5F9;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn-row .btn-save {
    flex: 1;
  }

  .footer-app {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: #64748B;
    border-top: 1px solid #E2E8F0;
    flex-shrink: 0;
  }

  body.dark .footer-app {
    color: #94A3B8;
    border-top-color: #1E293B;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1E293B;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 999;
    border-left: 4px solid #2563EB;
    max-width: 90%;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.error {
    border-left-color: #DC2626;
  }

  .alert-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
  }

  .alert-box {
    background: #FFFFFF;
    padding: 24px;
    border-radius: 16px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    border: 1px solid #E2E8F0;
  }

  body.dark .alert-box {
    background: #111827;
    border-color: #1E293B;
  }

  .alert-box p {
    margin-bottom: 16px;
    line-height: 1.6;
    font-size: 15px;
  }

  .alert-box .btn-full {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #2563EB;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }

  .alert-box .btn-full:active {
    transform: scale(0.97);
  }

  .hidden {
    display: none !important;
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: #94A3B8;
  }

  .loading-state .spin {
    width: 32px;
    height: 32px;
    border: 3px solid #E2E8F0;
    border-top-color: #2563EB;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  .not-found {
    text-align: center;
    padding: 60px 20px;
  }

  .not-found svg {
    width: 48px;
    height: 48px;
    stroke: #94A3B8;
    margin-bottom: 12px;
  }

  .not-found h3 {
    font-size: 17px;
    margin-bottom: 4px;
  }

  .not-found p {
    color: #94A3B8;
    font-size: 14px;
  }

  .not-found .btn {
    margin-top: 16px;
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: #2563EB;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }

  .not-found .btn:active {
    transform: scale(0.97);
  }
</style>
</head>
<body>

<div class="app-container">

  <!-- HEADER -->
  <div class="app-header">
    <div class="logo-area">
      <div class="menu-icon" onclick="openSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </div>
      <span class="app-title">Star Tools</span>
    </div>
    <div class="header-action">
      <button class="back-btn" onclick="goTo('daftar-tugas.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Daftar Tugas</span>
      </button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="sidebar-nav" id="sidebarNav">
    <div class="close-sidebar-icon" onclick="closeSidebar()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <a href="#" onclick="goTo('index.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg> Utama
    </a>
    <a href="#" onclick="goTo('berita.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
        <line x1="8" y1="8" x2="16" y2="8"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="8" y1="16" x2="12" y2="16"/>
      </svg> Berita
    </a>
    <a href="#" onclick="goTo('premium.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg> Premium
    </a>
    <a href="#" onclick="goTo('akun.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg> Akun
    </a>
    <div class="logout-link">
      <a href="#" onclick="logoutAction()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg> Keluar
      </a>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div class="page-container">

    <!-- LOADING -->
    <div id="loadingState" class="loading-state">
      <div class="spin"></div>
      <div>Memuat tugas...</div>
    </div>

    <!-- NOT FOUND -->
    <div id="notFoundState" class="not-found hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="17"/>
      </svg>
      <h3>Tugas Tidak Ditemukan</h3>
      <p>Kode tugas tidak valid atau sudah dihapus.</p>
      <button class="btn" onclick="goTo('daftar-tugas.html')">Kembali ke Daftar</button>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" class="hidden">

      <!-- INFO TUGAS -->
      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          Edit Tugas
        </div>
        <div class="card-sub" id="tugasInfo">Kode: <span id="tugasKodeDisplay">-</span></div>

        <div class="link-box">
          <span class="link-text" id="tugasLink">-</span>
          <button class="copy-btn" onclick="copyLink()">Salin</button>
        </div>
      </div>

      <!-- FORM EDIT -->
      <div class="card">
        <div class="input-group">
          <label>Judul Tugas</label>
          <input type="text" id="editJudul" class="input-field" placeholder="Masukkan judul tugas...">
        </div>

        <div class="input-group">
          <label>Deskripsi</label>
          <textarea id="editDeskripsi" class="input-field" placeholder="Deskripsi tugas..."></textarea>
        </div>

        <div class="input-group">
          <label>Durasi Pengerjaan (menit)</label>
          <input type="number" id="editDurasi" class="input-field" placeholder="60" min="1" max="60" disabled>
          <div style="font-size:11px;color:#94A3B8;margin-top:4px;">Durasi tidak dapat diubah</div>
        </div>

        <div class="input-group">
          <label>Upload Soal (Foto)</label>
          <div class="file-upload" id="fileUpload" onclick="document.getElementById('fileInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            Klik untuk upload foto soal
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none;">
          <div id="filePreview" class="file-preview hidden">
            <span id="fileName">file.jpg</span>
            <span class="remove" onclick="hapusFile()">×</span>
          </div>
          <div id="existingFileInfo" class="file-exists hidden">Foto soal tersimpan</div>
        </div>

        <div class="btn-row">
          <button class="btn-save" id="btnSimpan" onclick="simpanPerubahan()">
            <span class="spinner"></span>
            <span class="btn-text">Simpan Perubahan</span>
            <span class="btn-text-loading">Menyimpan...</span>
          </button>
          <button class="btn-save btn-secondary" onclick="goTo('daftar-tugas.html')">Batal</button>
        </div>

        <button class="btn-save btn-danger" id="btnHapus" onclick="hapusTugas()" style="margin-top:10px;">
          Hapus Tugas
        </button>
      </div>

    </div>
  </div>

  <div class="footer-app">
    <p>Star Platform | Star Tools 2026</p>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- ALERT -->
<div id="globalAlert" class="alert-overlay">
  <div class="alert-box">
    <p id="alertMessage">Pemberitahuan</p>
    <button class="btn-full" onclick="closeAlert()">Mengerti</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
  authDomain: "laporanstartools-c18b2.firebaseapp.com",
  databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporanstartools-c18b2",
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

let currentUser = null;
let tugasData = null;
let tugasKode = null;
let fileBase64 = null;
let existingFileUrl = null;

firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    loadTugas();
  } else {
    window.location.href = 'login.html';
  }
});

if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
}

function openSidebar() {
  document.getElementById('sidebarOverlay').classList.add('active');
  document.getElementById('sidebarNav').classList.add('active');
}

function closeSidebar() {
  document.getElementById('sidebarOverlay').classList.remove('active');
  document.getElementById('sidebarNav').classList.remove('active');
}

function goTo(page) {
  window.location.href = page;
}

function logoutAction() {
  firebase.auth().signOut().then(function() {
    window.location.href = 'login.html';
  });
}

function loadTugas() {
  var urlParams = new URLSearchParams(window.location.search);
  tugasKode = urlParams.get('kode');

  if (!tugasKode) {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('notFoundState').classList.remove('hidden');
    return;
  }

  db.ref('tugas/' + tugasKode).once('value').then(function(snap) {
    var data = snap.val();
    document.getElementById('loadingState').classList.add('hidden');

    if (!data) {
      document.getElementById('notFoundState').classList.remove('hidden');
      return;
    }

    if (data.pembuat_id !== currentUser.uid) {
      showAlert('Anda tidak memiliki akses ke tugas ini!');
      document.getElementById('notFoundState').classList.remove('hidden');
      return;
    }

    tugasData = data;
    tampilkanData();
    document.getElementById('mainContent').classList.remove('hidden');

  }).catch(function(err) {
    document.getElementById('loadingState').classList.add('hidden');
    showAlert('Gagal memuat tugas: ' + err.message);
    document.getElementById('notFoundState').classList.remove('hidden');
  });
}

function tampilkanData() {
  if (!tugasData) return;

  document.getElementById('tugasKodeDisplay').innerText = tugasData.kode;

  var link = window.location.origin + window.location.pathname.replace('edit.html', 'tugas.html') + '?kode=' + tugasData.kode;
  document.getElementById('tugasLink').innerText = link;

  document.getElementById('editJudul').value = tugasData.judul || '';
  document.getElementById('editDeskripsi').value = tugasData.deskripsi || '';
  document.getElementById('editDurasi').value = tugasData.durasi || 60;

  if (tugasData.foto_soal) {
    existingFileUrl = tugasData.foto_soal;
    document.getElementById('existingFileInfo').classList.remove('hidden');
  }
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    showToast('File maksimal 5MB!', 'error');
    this.value = '';
    return;
  }
  var reader = new FileReader();
  reader.onload = function(event) {
    fileBase64 = event.target.result;
    document.getElementById('fileUpload').classList.add('has-file');
    document.getElementById('filePreview').classList.remove('hidden');
    document.getElementById('fileName').innerText = file.name;
    document.getElementById('existingFileInfo').classList.add('hidden');
  };
  reader.readAsDataURL(file);
});

function hapusFile() {
  fileBase64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileUpload').classList.remove('has-file');
  document.getElementById('filePreview').classList.add('hidden');
  if (existingFileUrl) {
    document.getElementById('existingFileInfo').classList.remove('hidden');
  }
}

function copyLink() {
  var text = document.getElementById('tugasLink').innerText;
  navigator.clipboard.writeText(text).then(function() {
    showToast('Link disalin!');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Link disalin!');
  });
}

function simpanPerubahan() {
  var btn = document.getElementById('btnSimpan');

  if (btn.disabled) return;

  var judul = document.getElementById('editJudul').value.trim();
  var deskripsi = document.getElementById('editDeskripsi').value.trim();

  if (!judul) {
    showAlert('Judul wajib diisi!');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  var updates = {
    judul: judul,
    deskripsi: deskripsi || 'Tidak ada deskripsi'
  };

  if (fileBase64) {
    updates.foto_soal = fileBase64;
  } else if (!existingFileUrl) {
    updates.foto_soal = null;
  }

  db.ref('tugas/' + tugasKode).update(updates).then(function() {
    showToast('Perubahan disimpan!');
    btn.disabled = false;
    btn.classList.remove('loading');
    // Reload data
    loadTugas();
  }).catch(function(err) {
    showAlert('Gagal menyimpan: ' + err.message);
    btn.disabled = false;
    btn.classList.remove('loading');
  });
}

function hapusTugas() {
  if (!confirm('Yakin ingin menghapus tugas ini? Tindakan ini tidak dapat dibatalkan!')) {
    return;
  }

  var btn = document.getElementById('btnHapus');
  btn.disabled = true;
  btn.innerText = 'Menghapus...';

  db.ref('tugas/' + tugasKode).remove().then(function() {
    showToast('Tugas berhasil dihapus!');
    setTimeout(function() {
      goTo('daftar-tugas.html');
    }, 1000);
  }).catch(function(err) {
    showAlert('Gagal menghapus: ' + err.message);
    btn.disabled = false;
    btn.innerText = 'Hapus Tugas';
  });
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  if (type === 'error') t.classList.add('error');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showAlert(msg) {
  document.getElementById('alertMessage').textContent = msg;
  document.getElementById('globalAlert').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('globalAlert').style.display = 'none';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSidebar();
    closeAlert();
  }
});
</script>

</body>
</html>
