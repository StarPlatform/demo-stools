<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
  authDomain: "laporanstartools-c18b2.firebaseapp.com",
  databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporanstartools-c18b2",
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

let currentUser = null;
let tugasListener = null;

firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    loadTugas();
  } else {
    window.location.href = 'login.html';
  }
});

if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
}

function openSidebar() {
  document.getElementById('sidebarOverlay').classList.add('active');
  document.getElementById('sidebarNav').classList.add('active');
}

function closeSidebar() {
  document.getElementById('sidebarOverlay').classList.remove('active');
  document.getElementById('sidebarNav').classList.remove('active');
}

function goTo(page) {
  window.location.href = page;
}

function logoutAction() {
  firebase.auth().signOut().then(function() {
    window.location.href = 'login.html';
  });
}

function loadTugas() {
  if (!currentUser) return;

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('taskList').innerHTML = '';

  if (tugasListener) {
    tugasListener.off();
  }

  tugasListener = db.ref('tugas').orderByChild('pembuat_id').equalTo(currentUser.uid);
  tugasListener.on('value', function(snap) {
    var data = snap.val();
    document.getElementById('loadingState').style.display = 'none';

    if (!data) {
      showEmpty();
      return;
    }

    var list = [];
    Object.keys(data).forEach(function(key) {
      var item = data[key];
      item._key = key;
      list.push(item);
    });

    list.sort(function(a, b) {
      return b.created_at - a.created_at;
    });

    renderList(list);
  });
}

function renderList(list) {
  var container = document.getElementById('taskList');

  if (list.length === 0) {
    showEmpty();
    return;
  }

  var html = '';
  list.forEach(function(tugas) {
    var tgl = new Date(tugas.created_at);
    var tglStr = tgl.toLocaleDateString('id-ID');

    var statusClass = tugas.status === 'aktif' ? 'aktif' : 'nonaktif';
    var statusText = tugas.status === 'aktif' ? 'Aktif' : 'Nonaktif';

    var isPremium = tugas.fitur && tugas.fitur.premium || false;
    var badgeClass = isPremium ? 'premium' : 'standar';
    var badgeText = isPremium ? 'Premium' : 'Standar';

    var fiturCount = 0;
    if (tugas.fitur) {
      Object.keys(tugas.fitur).forEach(function(k) {
        if (tugas.fitur[k] && k !== 'premium') fiturCount++;
      });
    }

    // Cek apakah ada jawaban
    var jawabanCount = 0;
    if (tugas.jawaban) {
      jawabanCount = Object.keys(tugas.jawaban).length;
    }

    html += `
      <div class="task-item" onclick="goTo('edit.html?kode=${tugas._key}')">
        <div class="info">
          <div class="judul">${escapeHtml(tugas.judul || 'Tanpa Judul')}</div>
          <div class="meta">
            <span>${tglStr}</span>
            <span>${tugas.durasi || 0} menit</span>
            <span class="badge ${statusClass}">${statusText}</span>
            <span class="badge ${badgeClass}">${badgeText}</span>
            ${fiturCount > 0 ? `<span>${fiturCount} fitur</span>` : ''}
            ${jawabanCount > 0 ? `<span>${jawabanCount} jawaban</span>` : ''}
          </div>
        </div>
        <div class="arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

function showEmpty() {
  document.getElementById('taskList').innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="17"/>
      </svg>
      <h3>Belum Ada Tugas</h3>
      <p>Klik tombol "Buat Tugas Baru" untuk mulai.</p>
    </div>
  `;
}

function escapeHtml(text) {
  if (!text) return '';
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  if (type === 'error') t.classList.add('error');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showAlert(msg) {
  document.getElementById('alertMessage').textContent = msg;
  document.getElementById('globalAlert').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('globalAlert').style.display = 'none';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSidebar();
    closeAlert();
  }
});
</script>

</body>
</html>
