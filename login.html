<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - Star Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #F1F5F9;
    color: #0F172A;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  body.dark {
    background: #0B1120;
    color: #F1F5F9;
  }

  .login-container {
    width: 100%;
    max-width: 400px;
    background: #FFFFFF;
    border-radius: 28px;
    padding: 40px 28px 32px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    border: 1px solid #E2E8F0;
    animation: fadeSlide 0.4s ease;
  }

  body.dark .login-container {
    background: #111827;
    border-color: #1E293B;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  }

  @keyframes fadeSlide {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-header .app-icon {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }

  .login-header .app-icon img {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    object-fit: contain;
    background: transparent;
  }

  /* 🔥 MODE TERANG - logo putih akan terlihat di container putih */
  body:not(.dark) .login-header .app-icon img {
    /* Tidak ada background, biarkan transparan */
  }

  /* 🔥 MODE GELAP - logo putih tetap terlihat di container gelap */
  body.dark .login-header .app-icon img {
    /* Tetap transparan, tidak ada background tambahan */
  }

  .login-header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, #2563EB, #60A5FA);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .login-header .tagline {
    font-size: 13px;
    color: #64748B;
    margin-top: 4px;
    line-height: 1.5;
  }

  body.dark .login-header .tagline {
    color: #94A3B8;
  }

  .input-group {
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 4px;
  }

  body.dark .input-group label {
    color: #94A3B8;
  }

  .input-group input {
    width: 100%;
    padding: 14px 16px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    border-radius: 14px;
    color: #0F172A;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
  }

  body.dark .input-group input {
    background: #1E293B;
    border-color: #334155;
    color: #F1F5F9;
  }

  .input-group input:focus {
    border-color: #2563EB;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  body.dark .input-group input:focus {
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  .input-group input::placeholder {
    color: #94A3B8;
  }

  body.dark .input-group input::placeholder {
    color: #64748B;
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #2563EB;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 6px;
  }

  .btn-login:active {
    transform: scale(0.97);
  }

  .btn-login:disabled {
    opacity: 0.6;
    transform: none;
  }

  body.dark .btn-login {
    background: #3B82F6;
  }

  .switch-container {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #E2E8F0;
    text-align: center;
  }

  body.dark .switch-container {
    border-top-color: #1E293B;
  }

  .switch {
    font-size: 13px;
    color: #64748B;
    cursor: pointer;
    margin-bottom: 10px;
  }

  body.dark .switch {
    color: #94A3B8;
  }

  .switch span {
    color: #2563EB;
    font-weight: 600;
  }

  body.dark .switch span {
    color: #60A5FA;
  }

  .switch span:active {
    opacity: 0.7;
  }

  .switch-guest {
    font-size: 13px;
    color: #94A3B8;
    cursor: pointer;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    transition: 0.2s;
  }

  .switch-guest:active {
    background: rgba(0, 0, 0, 0.05);
  }

  body.dark .switch-guest:active {
    background: rgba(255, 255, 255, 0.05);
  }

  body.dark .switch-guest {
    color: #94A3B8;
  }

  #customAlert {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(6px);
    z-index: 9999;
    justify-content: center;
    align-items: center;
  }

  #customAlert > div {
    background: #FFFFFF;
    padding: 28px 24px;
    border-radius: 24px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    border: 1px solid #E2E8F0;
    animation: scaleIn 0.2s ease;
  }

  body.dark #customAlert > div {
    background: #111827;
    border-color: #1E293B;
  }

  @keyframes scaleIn {
    from {
      transform: scale(0.92);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  #customAlert p#alertMsg {
    color: #0F172A;
    font-size: 15px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  body.dark #customAlert p#alertMsg {
    color: #F1F5F9;
  }

  #customAlert button {
    background: #2563EB;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    width: 100%;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  #customAlert button:active {
    transform: scale(0.97);
  }

  body.dark #customAlert button {
    background: #3B82F6;
  }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 40px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }

  body.dark .theme-toggle {
    background: #1E293B;
    border-color: #334155;
  }

  .theme-toggle:active {
    transform: scale(0.92);
  }

  .theme-toggle svg {
    width: 18px;
    height: 18px;
    stroke: #0F172A;
    fill: none;
    stroke-width: 2;
  }

  body.dark .theme-toggle svg {
    stroke: #F1F5F9;
  }

  @media (max-width: 420px) {
    .login-container {
      padding: 32px 20px 28px;
    }
    .login-header h1 {
      font-size: 22px;
    }
    .login-header .app-icon img {
      width: 56px;
      height: 56px;
    }
  }
</style>
</head>
<body>

<!-- THEME TOGGLE -->
<div class="theme-toggle" onclick="toggleTheme()">
  <svg viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/>
  </svg>
</div>

<!-- LOGIN CARD -->
<div class="login-container">

  <div class="login-header">
    <div class="app-icon">
      <!-- 
        🔥 TEMPAT LOGO JPG ANDA
        GANTI src="logo.jpg" dengan path file logo JPG kamu
        Contoh: src="assets/logo.jpg" atau src="logo-star-tools.jpg"
      -->
      <img src="logo.jpg" alt="Star Tools" id="logoImage">
    </div>
    <h1 id="title">Selamat Datang Kembali</h1>
    <p class="tagline">Jelajahi kreativitas tanpa batas. Kembangkan potensimu bersama ekosistem alat digital terbaik.</p>
  </div>

  <!-- FORM -->
  <div class="input-group" id="usernameGroup" style="display:none;">
    <label>Username</label>
    <input type="text" id="username" placeholder="Masukkan username">
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Masukkan email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password">
  </div>

  <button class="btn-login" id="actionBtn" onclick="login()">Login</button>

  <div class="switch-container">
    <div class="switch" onclick="toggleMode()">
      Belum punya akun? <span>Daftar</span>
    </div>
    <div class="switch-guest" onclick="skipLogin()">
      Lewati login (Masuk sebagai Guest)
    </div>
  </div>

</div>

<!-- ALERT -->
<div id="customAlert">
  <div>
    <p id="alertMsg"></p>
    <button onclick="closeCustomAlert()">OK</button>
  </div>
</div>

<script>
  // ==========================================================================
  // 🔥 SEMUA KODE JAVASCRIPT ASLI TETAP SAMA (TIDAK DIUBAH)
  // ==========================================================================

  const firebaseConfig = {
    apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
    authDomain: "laporanstartools-c18b2.firebaseapp.com",
    databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "laporanstartools-c18b2",
    storageBucket: "laporanstartools-c18b2.firebasestorage.app",
    messagingSenderId: "596585220522",
    appId: "1:596585220522:web:d61e13c60daff6daca43d3"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let isLogin = true;

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      window.location.href = "index.html";
    }
  });

  function toggleMode() {
    isLogin = !isLogin;

    document.getElementById("title").innerText = isLogin ? "Selamat Datang Kembali" : "Daftarkan Akun";
    document.getElementById("actionBtn").innerText = isLogin ? "Selamat Datang Kembali" : "Daftarkan Akun";

    const usernameGroup = document.getElementById("usernameGroup");
    usernameGroup.style.display = isLogin ? "none" : "block";

    document.querySelector(".switch").innerHTML = isLogin
      ? 'Belum punya akun? <span>Daftar</span>'
      : 'Sudah punya akun? <span>Login</span>';
  }

  function signup() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !email || !password) {
      showCustomAlert("Harap Isi Semua Data!");
      return;
    }

    if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
      showCustomAlert("Username hanya boleh huruf, angka, dan underscore. 3-20 karakter.");
      return;
    }

    if (password.length < 8) {
      showCustomAlert("Password minimal 8 karakter.");
      return;
    }

    const btn = document.getElementById("actionBtn");
    btn.disabled = true;
    btn.innerText = "Memproses...";

    firebase.auth().createUserWithEmailAndPassword(email, password)
      .then(res => {
        const uid = res.user.uid;
        return db.ref("users/" + uid).set({
          username: username,
          email: email,
          premium: false,
          createdAt: Date.now()
        });
      })
      .then(() => {
        const redirect = localStorage.getItem("redirectAfterLogin");
        if (redirect) {
          localStorage.removeItem("redirectAfterLogin");
          safeRedirect(redirect);
        } else {
          window.location.href = "index.html";
        }
      })
      .catch(err => {
        showCustomAlert(getFriendlyError(err.code));
        btn.disabled = false;
        btn.innerText = "Daftar";
      });
  }

  function getFriendlyError(code) {
    switch (code) {
      case 'auth/invalid-credential':
      case 'auth/wrong-password':
      case 'auth/user-not-found':
      case 'auth/invalid-login-credentials':
      case 'auth/invalid-email':
        return 'Email atau password salah.';
      case 'auth/too-many-requests':
        return 'Terlalu banyak percobaan. Akun sementara dikunci. Coba lagi nanti.';
      case 'auth/network-request-failed':
        return 'Koneksi gagal. Periksa internet kamu.';
      case 'auth/email-already-in-use':
        return 'Email ini sudah terdaftar. Silakan login.';
      case 'auth/weak-password':
        return 'Password terlalu lemah. Minimal 6 karakter.';
      default:
        return 'Terjadi kesalahan. Silakan coba lagi.';
    }
  }

  let loginAttempts = 0;
  let lockUntil = 0;

  function login() {
    if (!isLogin) {
      signup();
      return;
    }

    if (Date.now() < lockUntil) {
      const sisaDetik = Math.ceil((lockUntil - Date.now()) / 1000);
      showCustomAlert(`Terlalu banyak percobaan. Tunggu ${sisaDetik} detik.`);
      return;
    }

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      showCustomAlert('Harap isi email dan password.');
      return;
    }

    const btn = document.getElementById("actionBtn");
    btn.disabled = true;
    btn.innerText = "Memproses...";

    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(() => {
        loginAttempts = 0;
        const redirect = localStorage.getItem("redirectAfterLogin");
        if (redirect) {
          localStorage.removeItem("redirectAfterLogin");
          safeRedirect(redirect);
        } else {
          window.location.href = "index.html";
        }
      })
      .catch(err => {
        loginAttempts++;
        if (loginAttempts >= 5) {
          lockUntil = Date.now() + 60000;
          loginAttempts = 0;
          showCustomAlert('Terlalu banyak percobaan. Tunggu 60 detik sebelum mencoba lagi.');
        } else {
          showCustomAlert(getFriendlyError(err.code));
        }
        btn.disabled = false;
        btn.innerText = "Login";
      });
  }

  function showCustomAlert(text) {
    document.getElementById("alertMsg").innerText = text;
    document.getElementById("customAlert").style.display = "flex";
  }

  function closeCustomAlert() {
    document.getElementById("customAlert").style.display = "none";
  }

  function skipLogin() {
    localStorage.setItem("isGuest", "true");
    window.location.href = "index.html";
  }

  function safeRedirect(url) {
    try {
      const parsed = new URL(url, window.location.origin);
      if (parsed.origin === window.location.origin) {
        window.location.href = parsed.href;
      } else {
        window.location.href = "index.html";
      }
    } catch (e) {
      window.location.href = "index.html";
    }
  }

  // ==========================================================================
  // 🔥 TAMBAHAN: THEME TOGGLE (HANYA UNTUK TAMPILAN)
  // ==========================================================================
  function toggleTheme() {
    document.body.classList.toggle('dark');
    localStorage.setItem('loginTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
  }

  if (localStorage.getItem('loginTheme') === 'dark') {
    document.body.classList.add('dark');
  }

  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
  }

  // ==========================================================================
  // 🔥 FALLBACK: JIKA LOGO GAGAL LOAD, TAMPILKAN INISIAL
  // ==========================================================================
  document.getElementById('logoImage').addEventListener('error', function() {
    this.style.display = 'none';
    const fallback = document.createElement('div');
    fallback.innerHTML = `
      <svg viewBox="0 0 100 100" fill="none" style="width:64px;height:64px;">
        <circle cx="50" cy="50" r="45" fill="url(#starGrad)" opacity="0.12"/>
        <path d="M50 8 L58.5 35 L87 35 L64.5 52 L73 79 L50 62 L27 79 L35.5 52 L13 35 L41.5 35 L50 8Z" 
              fill="url(#starGrad)" stroke="url(#starGrad)" stroke-width="1.5"/>
        <defs>
          <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="50%" stop-color="#6366F1"/>
            <stop offset="100%" stop-color="#A855F7"/>
          </linearGradient>
        </defs>
      </svg>
    `;
    this.parentNode.appendChild(fallback.firstElementChild);
  });
</script>

</body>
</html>
